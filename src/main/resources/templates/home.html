<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">

    <h2 class="mb-1">
        Bienvenue,
        <span th:text="${#authentication.principal.nomPrenom}"></span> 👋
    </h2>

    <p class="text-muted">
        Gestion des Cautions
    </p>

    <hr>

    <!-- Statistics -->
    <div class="row g-3 mb-4">

        <div class="col-md">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h6>Total</h6>
                    <h3 th:text="${total}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h6>En Cours</h6>
                    <h3 th:text="${enCours}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h6>Main Levée</h6>
                    <h3 th:text="${mainLevee}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h6>Restituées</h6>
                    <h3 th:text="${restitue}"></h3>
                </div>
            </div>
        </div>

        <div class="col-md">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h6>Montant Total</h6>
                    <h3 th:text="${#numbers.formatDecimal(montantTotal,1,2)} + ' DT'"></h3>
                </div>
            </div>
        </div>

    </div>

    <!-- Recent cautions -->
    <div class="card shadow-sm">

        <div class="card-header">
            Dernières Cautions
        </div>

        <div class="card-body p-0">

            <table class="table table-hover mb-0">

                <thead class="table-light">
                <tr>
                    <th>Code</th>
                    <th>Banque</th>
                    <th>Fournisseur</th>
                    <th>État</th>
                    <th>Date</th>
                    <th>Montant</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="c : ${dernieres}">
                    <td th:text="${c.codeInterne}"></td>
                    <td th:text="${c.banque.libelle}"></td>
                    <td th:text="${c.fournisseur.libelle}"></td>
                    <td th:text="${c.etat}"></td>
                    <td th:text="${#temporals.format(c.date,'dd/MM/yyyy')}"></td>
                    <td th:text="${c.montant + ' DT'}"></td>
                </tr>

                <tr th:if="${#lists.isEmpty(dernieres)}">
                    <td colspan="6" class="text-center">
                        Aucune caution disponible.
                    </td>
                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</html>
