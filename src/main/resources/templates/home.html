<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Home</title>

    <style>
        .welcome-box {
            background: white;
            border-radius: 8px;
            padding: 25px;
            border: 1px solid #e5e7eb;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            color: #111827;
        }

        .subtitle {
            color: #6b7280;
            font-size: 13px;
        }

        .quick-links {
            margin-top: 20px;
        }

        .quick-links a {
            display: block;
            padding: 10px 14px;
            margin-bottom: 8px;
            background: #f9fafb;
            border-radius: 6px;
            text-decoration: none;
            color: #111827;
            border: 1px solid #e5e7eb;
        }

        .quick-links a:hover {
            background: #eef2ff;
        }

        .badge-role {
            font-size: 12px;
            background: #e0e7ff;
            color: #3730a3;
            padding: 4px 8px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div layout:fragment="content">

    <div class="container">

        <div class="row justify-content-center" style="margin-top: 40px;">

            <div class="col-md-8">

                <!-- 🟦 WELCOME BOX -->
                <div class="welcome-box">

                    <div class="title">
                        Bienvenue dans le système de gestion des cautions
                    </div>

                    <div class="subtitle mt-1">
                        Poste Tunisienne - Système interne de suivi des cautions bancaires
                    </div>

                    <div class="mt-2">
                        Rôle :
                        <span class="badge-role"
                              th:text="${#authentication.authorities}">
                        </span>
                    </div>

                    <!-- 🔗 QUICK ACCESS -->
                    <div class="quick-links">

                        <a th:href="@{/cautions}">
                            🧾 Accéder aux Cautions
                        </a>

                        <a th:href="@{/banques}">
                            🏦 Accéder aux Banques
                        </a>

                        <a th:href="@{/fournisseurs}">
                            👤 Accéder aux Fournisseurs
                        </a>

                        <a th:href="@{/ordonnateurs}">
                            🏢 Accéder aux Ordonnateurs
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
