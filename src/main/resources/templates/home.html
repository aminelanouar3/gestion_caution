<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Home</title>

    <style>
        .dashboard-card {
            border: none;
            border-radius: 15px;
            transition: all 0.25s ease;
            text-align: center;
            padding: 30px;
            color: white;
            font-weight: 600;
            text-decoration: none;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div layout:fragment="content">

    <div class="container">

        <div class="row justify-content-center align-items-center" style="min-height: 75vh;">

            <div class="col-md-10">

                <div class="row g-4 justify-content-center">

                    <!-- USERS -->
                    <div class="col-md-4">
                        <a th:href="@{/users}" class="dashboard-card bg-primary d-block">
                            <div class="icon">👤</div>
                            Utilisateurs
                        </a>
                    </div>

                    <!-- CAUTIONS -->
                    <div class="col-md-4">
                        <a th:href="@{/cautions}" class="dashboard-card bg-success d-block">
                            <div class="icon">📄</div>
                            Cautions
                        </a>
                    </div>

                    <!-- BANQUES -->
                    <div class="col-md-4">
                        <a th:href="@{/banques}" class="dashboard-card bg-warning d-block">
                            <div class="icon">🏦</div>
                            Banques
                        </a>
                    </div>

                    <!-- FOURNISSEURS -->
                    <div class="col-md-4">
                        <a th:href="@{/fournisseurs}" class="dashboard-card bg-dark d-block">
                            <div class="icon">🚚</div>
                            Fournisseurs
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
