<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Home</title>

    <style>
        .dashboard-card {
            border: none;
            border-radius: 15px;
            transition: all 0.25s ease;
            text-align: center;
            padding: 30px;
            color: white;
            font-weight: 600;
            text-decoration: none;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div layout:fragment="content">

    <div class="container">

        <div class="row justify-content-center align-items-center" style="min-height: 75vh;">

            <div class="col-md-10">

                <div class="row justify-content-center g-4">

                    <!-- ADMIN ONLY -->
                    <div class="col-md-4" sec:authorize="hasRole('ADMINISTRATEUR')">
                        <a th:href="@{/users}" class="dashboard-card bg-primary d-block">
                            <div class="icon"></div>
                            Gestion Utilisateurs
                        </a>
                    </div>

                    <div class="col-md-4" sec:authorize="hasRole('ADMINISTRATEUR')">
                        <a th:href="@{/banques}" class="dashboard-card bg-secondary d-block">
                            <div class="icon"></div>
                            Gestion Banques
                        </a>
                    </div>

                    <div class="col-md-4" sec:authorize="hasRole('ADMINISTRATEUR')">
                        <a th:href="@{/fournisseurs}" class="dashboard-card bg-secondary d-block">
                            Gestion Fournisseurs
                        </a>
                    </div>
                    <div class="col-md-4" sec:authorize="hasRole('ADMINISTRATEUR')">
                        <a th:href="@{/ordonnateurs}" class="dashboard-card bg-secondary d-block">
                            Gestion Ordonnateurs
                        </a>
                    </div>

                    <!-- ADMIN + GESTIONNAIRE -->
                    <div class="col-md-4" sec:authorize="hasAnyRole('ADMINISTRATEUR','GESTIONNAIRE')">
                        <a th:href="@{/gestion}" class="dashboard-card bg-success d-block">
                            <div class="icon"></div>
                            Gestion Cautions
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
