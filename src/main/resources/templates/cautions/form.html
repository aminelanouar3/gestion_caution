<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">

<div layout:fragment="content">

    <h3>Formulaire Caution</h3>

    <form th:action="@{/cautions/save}" th:object="${caution}" method="post">

        <input type="hidden" th:field="*{codeInterne}"/>

        <!-- REFERENCE -->
        <div class="mb-2">
            <label>Référence</label>
            <input type="text"
                   class="form-control"
                   th:field="*{reference}"
                   maxlength="50"
                   required>
        </div>

        <!-- MONTANT -->
        <div class="mb-2">
            <label>Montant</label>
            <input type="number" step="0.01" class="form-control" th:field="*{montant}">
        </div>

        <!-- BANQUE -->
        <div class="mb-2">
            <label>Banque</label>
            <select class="form-control" name="banqueId">
                <option th:each="b : ${banques}"
                        th:value="${b.code}"
                        th:text="${b.libelle}">
                </option>
            </select>
        </div>

        <!-- FOURNISSEUR -->
        <div class="mb-2">
            <label>Fournisseur</label>
            <select name="fournisseurId" class="form-control">
                <option th:each="f : ${fournisseurs}"
                        th:value="${f.code}"
                        th:text="${f.libelle}">
                </option>
            </select>
        </div>

        <!-- ORDONNATEUR -->
        <div class="mb-2">
            <label>Ordonnateur</label>
            <select name="ordonnateurId" class="form-control">
                <option th:each="o : ${ordonnateurs}"
                        th:value="${o.code}"
                        th:text="${o.libelle}">
                </option>
            </select>
        </div>

        <!-- DATE -->
        <div class="mb-2">
            <label>Date Caution</label>
            <input type="date" class="form-control" th:field="*{date}" required>
        </div>

        <!-- REMARQUE -->
        <div class="mb-2">
            <label>Remarque</label>
            <textarea class="form-control" th:field="*{remarque}"></textarea>
        </div>

        <!-- SUBMIT -->
        <button class="btn btn-primary">Save</button>

    </form>

</div>

</html>
