<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">

    <h4 class="mb-3">Liste des Cautions</h4>
    <div th:if="${successMessage}"
         class="alert alert-success alert-dismissible fade show"
         role="alert">

        <span th:text="${successMessage}"></span>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert">
        </button>

    </div>
    <form method="get" th:action="@{/cautions}" class="mb-3">
        <div class="row g-2 align-items-end">
            <!-- CODE INTERNE -->
            <div class="col-md-3">
                <input type="text"
                       name="code"
                       class="form-control"
                       placeholder="Code interne">
            </div>
            <!-- REFERENCE -->
            <div class="col-md-3">
                <input type="text"
                       name="reference"
                       class="form-control"
                       placeholder="Référence">
            </div>
            <!-- ETAT -->
            <div class="col-md-3">
                <select name="etat" class="form-control">
                    <option value="">Tous les états</option>
                    <option value="EN_COURS">EN_COURS</option>
                    <option value="MAIN_LEVEE">MAIN_LEVEE</option>
                    <option value="RESTITUE">RESTITUE</option>
                    <option value="SAISIE">SAISIE</option>
                </select>
            </div>
            <!-- SEARCH BUTTON -->
            <div class="col-md-2">
                <button class="btn btn-primary w-100">
                    Rechercher
                </button>
            </div>
        </div>
    </form>
    <!-- TABLE -->
    <table class="table table-bordered table-hover bg-white">

        <thead class="table-dark">
        <tr>
            <th>Code Interne</th>
            <th>Référence</th>
            <th>Banque</th>
            <th>Fournisseur</th>
            <th>Ordonnateur</th>
            <th>Montant</th>
            <th>Date Caution</th>
            <th>Main Levée</th>
            <th>Restitution</th>
            <th>État</th>
            <th>Observation</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="c : ${cautions}">

            <!-- BASIC INFO -->
            <td th:text="${c.codeInterne}"></td>
            <td th:text="${c.reference}"></td>
            <td th:text="${c.banque.libelle}"></td>
            <td th:text="${c.fournisseur.libelle}"></td>
            <td th:text="${c.ordonnateur.libelle}"></td>
            <td th:text="${c.montant}"></td>
            <td th:text="${c.date}"></td>

            <!-- DATES -->
            <td th:text="${c.dateMainLevee != null ? c.dateMainLevee : '—'}"></td>
            <td th:text="${c.dateRestitution != null ? c.dateRestitution : '—'}"></td>

            <!-- STATE BADGE -->
            <td>
                <span class="badge"
                      th:text="${c.etat}"
                      th:classappend="${
                        c.etat.name() == 'EN_COURS' ? ' bg-primary' :
                        c.etat.name() == 'MAIN_LEVEE' ? ' bg-warning text-dark' :
                        c.etat.name() == 'RESTITUE' ? ' bg-success' :
                        ' bg-secondary'
                      }">
                </span>
            </td>
            <td th:text="${c.remarque}"></td>
        </tr>

        </tbody>

    </table>

</div>

</html>
