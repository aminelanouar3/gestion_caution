<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">

    <div class="container mt-4">

        <h3 class="mb-4">Modifier Caution</h3>

        <form th:action="@{/cautions/admin/update}" method="post">

            <!-- CODE INTERNE -->
            <div class="mb-2">
                <label>Code Interne</label>
                <input type="text"
                       class="form-control"
                       name="codeInterne"
                       th:value="${caution.codeInterne}"
                       readonly>
            </div>

            <!-- DATE CAUTION -->
            <div class="mb-2">
                <label>Date Caution</label>
                <input type="date"
                       class="form-control"
                       name="date"
                       th:value="${caution.date}">
            </div>

            <!-- BANQUE -->
            <div class="mb-2">
                <label>Banque</label>
                <select class="form-control" name="banqueId">
                    <option value="">-- Sélectionner Banque --</option>

                    <option th:each="b : ${banques}"
                            th:value="${b.code}"
                            th:text="${b.libelle}"
                            th:selected="${caution.banque != null and b.code == caution.banque.code}">
                    </option>

                </select>
            </div>

            <!-- FOURNISSEUR -->
            <div class="mb-2">
                <label>Fournisseur</label>
                <select class="form-control" name="fournisseurId">
                    <option value="">-- Sélectionner Fournisseur --</option>

                    <option th:each="f : ${fournisseurs}"
                            th:value="${f.code}"
                            th:text="${f.libelle}"
                            th:selected="${caution.fournisseur != null and f.code == caution.fournisseur.code}">
                    </option>

                </select>
            </div>

            <!-- ORDONNATEUR -->
            <div class="mb-2">
                <label>Ordonnateur</label>
                <select class="form-control" name="ordonnateurId">
                    <option value="">-- Sélectionner Ordonnateur --</option>

                    <option th:each="o : ${ordonnateurs}"
                            th:value="${o.code}"
                            th:text="${o.libelle}"
                            th:selected="${caution.ordonnateur != null and o.code == caution.ordonnateur.code}">
                    </option>

                </select>
            </div>

            <!-- REFERENCE -->
            <div class="mb-2">
                <label>Référence</label>
                <input type="text"
                       class="form-control"
                       name="reference"
                       th:value="${caution.reference}">
            </div>

            <!-- MONTANT -->
            <div class="mb-2">
                <label>Montant</label>
                <input type="number"
                       step="0.01"
                       class="form-control"
                       name="montant"
                       th:value="${caution.montant}">
            </div>

            <!-- DATE MAIN LEVEE -->
            <div class="mb-2">
                <label>Date Main Levée</label>
                <input type="date"
                       class="form-control"
                       name="dateMainLevee"
                       th:value="${caution.dateMainLevee}">
            </div>

            <!-- DATE RESTITUTION -->
            <div class="mb-2">
                <label>Date Restitution</label>
                <input type="date"
                       class="form-control"
                       name="dateRestitution"
                       th:value="${caution.dateRestitution}">
            </div>

            <!-- ETAT -->
            <div class="mb-2">
                <label>État</label>
                <select class="form-control" name="etat">

                    <option th:each="e : ${T(com.poste.gestion_caution.entity.EtatCaution).values()}"
                            th:value="${e}"
                            th:text="${e}"
                            th:selected="${caution.etat == e}">
                    </option>

                </select>
            </div>

            <!-- REMARQUE -->
            <div class="mb-2">
                <label>Remarque</label>
                <textarea class="form-control"
                          name="remarque"
                          th:text="${caution.remarque}">
                </textarea>
            </div>

            <button class="btn btn-primary">
                Sauvegarder
            </button>

            <a href="/cautions/gestion" class="btn btn-secondary">
                Retour
            </a>

        </form>

    </div>

</div>

</html>
