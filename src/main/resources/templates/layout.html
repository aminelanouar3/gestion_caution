<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Gestion des Cautions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-size: 14px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #111827;
            color: #fff;
        }

        .sidebar-header {
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid #1f2937;
        }

        .sidebar a {
            display: block;
            padding: 10px 16px;
            color: #cbd5e1;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #1f2937;
            color: white;
        }

        .sidebar-section {
            margin-top: 10px;
            font-size: 11px;
            padding: 6px 16px;
            color: #6b7280;
            text-transform: uppercase;
        }

        /* TOPBAR */
        .topbar {
            height: 55px;
            margin-left: 240px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        /* CONTENT */
        .content {
            margin-left: 240px;
            padding: 18px;
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
        }

        .user-box {
            font-size: 13px;
        }
    </style>
</head>

<body>

<!-- 🟦 SIDEBAR -->
<div class="sidebar">

    <div class="sidebar-header">
         Gestion des Cautions
    </div>

    <!-- 🟢 CAUTIONS (ALL ROLES) -->
    <div class="sidebar-section">Cautions</div>

    <a th:href="@{/cautions}">
         Liste des Cautions
    </a>

    <!-- 🟡 GESTION MODULE -->
    <a th:href="@{/cautions/gestion}"
       sec:authorize="hasAnyRole('GESTIONNAIRE','ADMINISTRATEUR')">
        Gestion des Cautions
    </a>

    <!-- 🟡 CREATE -->
    <a th:href="@{/cautions/new}"
       sec:authorize="hasAnyRole('GESTIONNAIRE','ADMINISTRATEUR')">
        ➕ Nouvelle Caution
    </a>

    <!-- 🔴 ADMIN SECTION -->
    <div class="sidebar-section"
         sec:authorize="hasRole('ADMINISTRATEUR')">
        Administration
    </div>

    <a th:href="@{/users}"
       sec:authorize="hasRole('ADMINISTRATEUR')">
         Utilisateurs
    </a>

    <a th:href="@{/banques}"
       sec:authorize="hasRole('ADMINISTRATEUR')">
         Banques
    </a>

    <a th:href="@{/fournisseurs}"
       sec:authorize="hasRole('ADMINISTRATEUR')">
         Fournisseurs
    </a>

    <a th:href="@{/ordonnateurs}"
       sec:authorize="hasRole('ADMINISTRATEUR')">
         Ordonnateurs
    </a>

</div>

<!-- 🟨 TOP BAR -->
<div class="topbar">

    <div class="page-title" th:text="${title}">
        Dashboard
    </div>

    <span class="user-name"
          th:text="${#authentication.principal.nomPrenom}">
    </span>

    <div class="user-box d-flex align-items-center gap-2">
        <!-- 🚪 Logout as BUTTON -->
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn btn-sm btn-danger">
                Logout
            </button>
        </form>

    </div>

</div>

<!-- 🟩 MAIN CONTENT -->
<div class="content">

    <div layout:fragment="content">
        <!-- PAGE CONTENT HERE -->
    </div>

</div>

</body>
</html>
