<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE - Gestion Caution"></title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your global CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="app-body">

<nav class="navbar navbar-dark bg-dark px-3 shadow-sm"
     th:if="${hideNavbar == null}">

    <a class="navbar-brand fw-bold">Gestion Caution</a>

    <div class="ms-auto d-flex align-items-center">

        <a class="btn btn-outline-light ms-2" th:href="@{/home}">
            Home
        </a>

        <form th:action="@{/logout}" method="post" class="m-0">
            <button class="btn btn-danger btn-sm">
                Logout
            </button>
        </form>

    </div>
</nav>

<div class="container py-4">
    <div layout:fragment="content"></div>
</div>

</body>
</html>
