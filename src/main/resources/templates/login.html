<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - Gestion des Cautions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 360px;
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .login-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: #111827;
        }

        .login-header small {
            color: #6b7280;
        }

        .form-control {
            height: 42px;
            font-size: 14px;
        }

        .btn-login {
            height: 42px;
            font-weight: 500;
        }

        .error-box {
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <!-- 🏛 HEADER -->
    <div class="login-header">
        <h3>Gestion des Cautions</h3>
        <small>La Poste Tunisienne</small>
    </div>

    <!-- 🔐 FORM -->
    <form method="post" th:action="@{/login}">

        <div class="mb-2">
            <label class="form-label">Matricule</label>
            <input class="form-control" name="matricule" placeholder="Entrer votre matricule" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input class="form-control" type="password" name="password" placeholder="Mot de passe" required>
        </div>

        <button class="btn btn-primary w-100 btn-login">
            Se connecter
        </button>

    </form>

    <!-- ❌ ERROR -->
    <div th:if="${param.error}" class="alert alert-danger error-box">
        Identifiants incorrects ou compte désactivé.
    </div>

</div>

</body>
</html>
