<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Login</title>
</head>

<body>

<div layout:fragment="content" class="d-flex justify-content-center align-items-center" style="height: 80vh;">

    <div class="card p-4" style="width: 350px;">
        <h4 class="text-center mb-3">Login</h4>

        <form method="post" th:action="@{/login}">
            <input class="form-control mb-2" name="matricule" placeholder="Matricule">
            <input class="form-control mb-3" type="password" name="password" placeholder="Password">

            <button class="btn btn-primary w-100">Login</button>
        </form>
        <div th:if="${param.error}" class="alert alert-danger">
            Identifiants incorrects ou compte désactivé.
        </div>
    </div>

</div>

</body>
</html>
